<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8">
    <meta http-equiv="content-type" content="text/html; charset=utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/svg+xml" sizes="any" href="../images/favicon.svg">
    <title>Leandro Sciola - Google Drive</title>
  </head>
  <body>
    <script type="text/javascript">
    function googleDrive(iframe) {
        iframe.removeAttribute("srcdoc");
        iframe.src = "https://drive.google.com/embeddedfolderview?id=18pLl5WNTctS44HExPn1jCtPRPpCGV2TD#list";
    }
    </script>
    <iframe style="margin: 0 !important; padding: 0 !important; border: none !important; outline: none !important; width: 100% !important; min-height: 100vh !important;" srcdoc="<!DOCTYPE html><p style='color: #1a1a1a; font-family: sans, arial;'>Loading...</p>" frameborder="0" onload="googleDrive(this)"></iframe>
  </body>
</html>
